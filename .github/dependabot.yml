# Dependabot — keep the SHA-pinned GitHub Actions current.
# All `uses:` refs in .github/workflows/ are pinned to full 40-char commit SHAs
# (supply-chain hardening, 2026-06-27). Without automation those pins go stale
# and miss security patches, so Dependabot opens a weekly PR that bumps each
# action to the new release's SHA (keeping the `# vN` comment).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
