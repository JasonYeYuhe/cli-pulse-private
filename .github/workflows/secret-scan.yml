name: Secret scan

# Trust Hardening v2 (2026-06-30): preventative gitleaks gate so a credential can
# never re-enter the repo via a PR/push (the demo-reviewer leak that prompted this
# was never caught by CI). Scanning strategy:
#   - pull_request / push: scan ONLY the new commits, so the PRE-EXISTING historical
#     leak (handled separately by credential rotation + repo-visibility) does NOT
#     turn every PR red. New secrets in the diff fail the check.
#   - schedule (weekly) / manual: full-history scan, INFORMATIONAL (never blocks) —
#     a report of any historical findings for owner review.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"   # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks (pinned)
        env:
          GITLEAKS_VERSION: 8.18.4
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          COMMON=(--config .gitleaks.toml --redact --verbose --no-banner)
          if [ "$EVENT" = "pull_request" ]; then
            echo "Scanning PR commits ${PR_BASE_SHA}..${PR_HEAD_SHA}"
            gitleaks detect --source . "${COMMON[@]}" --log-opts="${PR_BASE_SHA}..${PR_HEAD_SHA}" --exit-code 1
          elif [ "$EVENT" = "push" ]; then
            if echo "$PUSH_BEFORE" | grep -qE '^0+$'; then
              echo "New branch — scanning HEAD commit only"
              gitleaks detect --source . "${COMMON[@]}" --log-opts="-1 ${PUSH_AFTER}" --exit-code 1
            else
              echo "Scanning pushed commits ${PUSH_BEFORE}..${PUSH_AFTER}"
              gitleaks detect --source . "${COMMON[@]}" --log-opts="${PUSH_BEFORE}..${PUSH_AFTER}" --exit-code 1
            fi
          else
            echo "Full-history scan (informational — historical leaks handled by rotation + repo visibility)"
            gitleaks detect --source . "${COMMON[@]}" --exit-code 0 --report-path /tmp/gitleaks-report.json || true
            COUNT=$(jq 'length' /tmp/gitleaks-report.json 2>/dev/null || echo "?")
            echo "Full-history findings: ${COUNT} (informational)" >> "$GITHUB_STEP_SUMMARY"
          fi
