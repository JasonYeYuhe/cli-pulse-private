name: Swift CI

# Cost-control v1: feature-branch pushes and draft PRs run a cheap
# smoke gate (CLIPulseCore tests + the macOS app build only). The
# full 5-scheme matrix runs only for pushes to main, non-draft PRs,
# the draft→ready transition, and manual dispatch.
#
# macOS runners cost 10x. Reducing 6 jobs → 2 on the common case
# saves ~67% of macOS-minute burn per feature-branch iteration.

on:
  push:
    paths:
      - 'CLI Pulse Bar/**'
      - '!CLI Pulse Bar/docs/**'
      - '!CLI Pulse Bar/screenshots/**'
      - '!CLI Pulse Bar/scripts/**'
      - '!CLI Pulse Bar/codexbar/**'
      - '!CLI Pulse Bar/**/*.md'
      - 'HelperSwift/**'
      - 'scripts/build_signed_app.sh'
      - 'scripts/embed_helper_in_archive.sh'
      - 'scripts/PHASE4D_XCODE_SETUP.md'
      - 'CLI Pulse Bar/scripts/build-appstore.sh'
      - '.github/workflows/swift-ci.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'CLI Pulse Bar/**'
      - '!CLI Pulse Bar/docs/**'
      - '!CLI Pulse Bar/screenshots/**'
      - '!CLI Pulse Bar/scripts/**'
      - '!CLI Pulse Bar/codexbar/**'
      - '!CLI Pulse Bar/**/*.md'
      - 'HelperSwift/**'
      - 'scripts/build_signed_app.sh'
      - 'scripts/embed_helper_in_archive.sh'
      - 'scripts/PHASE4D_XCODE_SETUP.md'
      - 'CLI Pulse Bar/scripts/build-appstore.sh'
      - '.github/workflows/swift-ci.yml'
  workflow_dispatch:

concurrency:
  # Push and pull_request events get distinct group keys (refs/heads/X
  # vs refs/pull/N/merge) so a same-commit push smoke cannot cancel a
  # PR full matrix and vice versa. Within one event stream, newer runs
  # cancel older ones for the same ref.
  group: swift-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  decide:
    name: Decide matrix (smoke vs full)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      run_full: ${{ steps.set.outputs.run_full }}
    steps:
      - id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            FULL=true
            REASON="manual workflow_dispatch"
          elif [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            FULL=true
            REASON="push to main"
          elif [[ "$EVENT_NAME" == "pull_request" && "$PR_DRAFT" != "true" ]]; then
            FULL=true
            REASON="pull_request not draft"
          else
            FULL=false
            REASON="feature push or draft PR — smoke only"
          fi

          if [[ "$FULL" == "true" ]]; then
            MATRIX='{"include":[{"scheme":"CLI Pulse Bar","destination":"platform=macOS"},{"scheme":"CLI Pulse iOS","destination":"generic/platform=iOS Simulator"},{"scheme":"CLI Pulse Watch","destination":"generic/platform=watchOS Simulator"},{"scheme":"CLI Pulse Widgets","destination":"platform=macOS"},{"scheme":"CLIPulseHelper","destination":"platform=macOS"}]}'
          else
            MATRIX='{"include":[{"scheme":"CLI Pulse Bar","destination":"platform=macOS"}]}'
          fi

          {
            echo "run_full=$FULL"
            echo "matrix=$MATRIX"
          } >> "$GITHUB_OUTPUT"
          echo "Decision: $REASON (run_full=$FULL)"
          echo "Matrix: $MATRIX"

  test-core:
    name: CLIPulseCore unit tests
    needs: decide
    # v1.10.6: bumped macos-14 → macos-15 for Xcode 16+ / Swift tools 6.0.
    # Sentry-cocoa 9.10+ declares swift-tools-version: 6.0 in its Package.swift,
    # which Xcode 15 (macos-14) can't parse → SPM resolve fails before compile.
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Swift test
        working-directory: CLI Pulse Bar/CLIPulseCore
        env:
          # DEBUG SupabaseConstants.anonKey lazy init triggers fatalError if
          # missing (v1.10.6 P3-6 self-check path). Any non-empty stub is
          # enough — the tests don't hit the network.
          CLI_PULSE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-key' }}
        # v1.10.6: dropped --parallel. Under macos-15 / Xcode 16 / Swift 6
        # tooling, parallel test execution exposes pre-existing shared-state
        # races in ProviderLimitMigrationTests (UserDefaults) and similar
        # tests that touch global singletons. Serial is ~50% slower but
        # deterministic, and the suite is small enough (~220 tests) that
        # the total wall time is still under 2 min.
        run: swift test

  build-apps:
    name: Build ${{ matrix.scheme }}
    needs: decide
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.decide.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Build ${{ matrix.scheme }}
        working-directory: CLI Pulse Bar
        run: |
          set -o pipefail
          xcodebuild build \
            -project "CLI Pulse Bar.xcodeproj" \
            -scheme "${{ matrix.scheme }}" \
            -destination "${{ matrix.destination }}" \
            -configuration Debug \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=""

  test-helper-swift:
    # Phase 4D: Swift port of cli_pulse_helper. The HelperSwift/
    # Package contains its own test suite (UDS framing + auth +
    # session manager + hook adapter + descent + settings
    # installer + streaming). Runs on every push that touches
    # the package or this workflow.
    name: HelperSwift Package tests
    needs: decide
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Swift test (HelperSwift)
        working-directory: HelperSwift
        run: swift test

  build-signed-app:
    # Phase 4D P1.D (Codex review): a green CI build only proves
    # something IF it produces the same artifact users will
    # install. `xcodebuild build CODE_SIGNING_ALLOWED=NO` above
    # leaves the helper unembedded + unsigned, so it doesn't
    # validate the actual shippable .app. This job runs the
    # canonical `scripts/build_signed_app.sh` and verifies that
    # the embedded helper + LaunchAgent plist land at the right
    # paths AND the app's sandbox / app-group entitlements
    # survive the manual re-sign.
    name: Signed-app reproducible build (Phase 4D)
    needs: [decide, test-helper-swift]
    runs-on: macos-15
    timeout-minutes: 30
    if: needs.decide.outputs.run_full == 'true' || github.event.pull_request.head.ref == 'phase4d-swift-helper'
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Run build_signed_app.sh (Debug, ad-hoc signing)
        run: |
          set -o pipefail
          ./scripts/build_signed_app.sh Debug

      - name: Verify embedded helper at Contents/Helpers/
        run: |
          set -o pipefail
          APP="build_app_output/DerivedData/Build/Products/Debug/CLI Pulse Bar.app"
          test -x "$APP/Contents/Helpers/cli_pulse_helper" \
            || (echo "::error::helper binary missing at $APP/Contents/Helpers/" && exit 1)
          file "$APP/Contents/Helpers/cli_pulse_helper" | grep -q "Mach-O" \
            || (echo "::error::helper is not a Mach-O binary" && exit 1)
          echo "OK: helper Mach-O present + executable"

      - name: Verify embedded LaunchAgent plist
        run: |
          set -o pipefail
          PLIST="build_app_output/DerivedData/Build/Products/Debug/CLI Pulse Bar.app/Contents/Library/LaunchAgents/yyh.CLI-Pulse.helper.plist"
          test -f "$PLIST" \
            || (echo "::error::LaunchAgent plist missing" && exit 1)
          # BundleProgram MUST be present (P1.4 contract) — relative
          # path eliminates runtime mutation.
          plutil -extract BundleProgram raw "$PLIST" \
            || (echo "::error::plist missing BundleProgram key" && exit 1)
          echo "OK: LaunchAgent plist present + BundleProgram set"

      - name: Verify entitlements survived re-sign
        run: |
          set -o pipefail
          APP="build_app_output/DerivedData/Build/Products/Debug/CLI Pulse Bar.app"
          ENT_BLOB="$(codesign -d --entitlements :- "$APP" 2>/dev/null)"
          # App must keep sandbox + app-group (would have been
          # stripped by a naive --force --deep re-sign — Codex P1.C).
          if ! grep -q "com.apple.security.app-sandbox" <<< "$ENT_BLOB"; then
            echo "::error::app sandbox entitlement was stripped" >&2; exit 2
          fi
          if ! grep -q "group.yyh.CLI-Pulse" <<< "$ENT_BLOB"; then
            echo "::error::app-group entitlement was stripped" >&2; exit 2
          fi
          # Helper must NOT have inherited the app's sandbox
          # entitlement (it's an unsandboxed LaunchAgent).
          HELPER_ENT="$(codesign -d --entitlements :- "$APP/Contents/Helpers/cli_pulse_helper" 2>/dev/null)"
          if grep -q "com.apple.security.app-sandbox" <<< "$HELPER_ENT"; then
            echo "::error::helper accidentally has app-sandbox entitlement" >&2; exit 2
          fi
          echo "OK: app sandbox + group preserved; helper unsandboxed"

      - name: Verify helper resolves its own path under launchd-style argv0
        run: |
          # Phase 4D iter11 (Codex P1④): the embedded helper must
          # return its real absolute on-disk path from
          # `_NSGetExecutablePath`, NOT from `CommandLine.arguments
          # .first`. Under launchd, argv[0] is the
          # `ProgramArguments[0]` label string ("cli_pulse_helper"),
          # not the bundle path. Pre-fix, the helper would compute
          # something like `/cli_pulse_helper` and embed it in the
          # `claude --settings` inline JSON, breaking structured
          # approvals.
          #
          # Simulate launchd's argv0 with `exec -a` and confirm
          # the helper resolves its real bundle path. We resolve
          # `HELPER` to an absolute path via `$(pwd)` first so
          # the `cd /` test case can still find the binary
          # (otherwise sh resolves the relative path against
          # the new cwd `/` and dies).
          set -o pipefail
          APP_REL="build_app_output/DerivedData/Build/Products/Debug/CLI Pulse Bar.app"
          HELPER="$(pwd)/$APP_REL/Contents/Helpers/cli_pulse_helper"
          test -x "$HELPER" || (echo "::error::helper not found at $HELPER" >&2; exit 1)

          DIRECT_PATH="$("$HELPER" self-path)"
          LABEL_PATH="$(/bin/sh -c 'exec -a "cli_pulse_helper" "$0" self-path' "$HELPER")"
          CWD_ROOT_PATH="$(cd / && /bin/sh -c 'exec -a "cli_pulse_helper" "$0" self-path' "$HELPER")"

          echo "direct            → $DIRECT_PATH"
          echo "argv0=label       → $LABEL_PATH"
          echo "argv0=label,cwd=/ → $CWD_ROOT_PATH"

          # All three resolutions must agree, and all three must
          # contain Contents/Helpers/cli_pulse_helper.
          if [ "$DIRECT_PATH" != "$LABEL_PATH" ] || [ "$DIRECT_PATH" != "$CWD_ROOT_PATH" ]; then
            echo "::error::self-path resolution differs across argv0 / cwd contexts (Codex P1④ regression)" >&2
            exit 2
          fi
          case "$DIRECT_PATH" in
            */Contents/Helpers/cli_pulse_helper)
              echo "OK: helper resolves to Contents/Helpers/cli_pulse_helper under launchd-style argv0"
              ;;
            *)
              echo "::error::self-path is not Contents/Helpers/cli_pulse_helper: $DIRECT_PATH" >&2
              exit 2
              ;;
          esac

  verify-archive-embedding:
    # Phase 4E Slice 4 follow-up (Codex review 2026-05-07): the
    # `build-signed-app` job above only validates the Debug-with-
    # script path — the ASC-bound `xcodebuild archive` flow is
    # different and was silently shipping archives WITHOUT the
    # helper because the .xcodeproj has no Run Script / Copy Files
    # phases for it. This job covers that gap: run the same
    # `xcodebuild archive` ASC uses, post-process via
    # `embed_helper_in_archive.sh`, then verify the four conditions
    # Codex pinned (helper Mach-O, LaunchAgent plist, codesign
    # verifies, BundleProgram points at embedded helper).
    name: Verify archive embedding (ASC path)
    needs: [decide, test-helper-swift]
    runs-on: macos-15
    timeout-minutes: 25
    if: needs.decide.outputs.run_full == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: xcodebuild archive (ad-hoc signing)
        run: |
          set -o pipefail
          mkdir -p build/ci-archive
          xcodebuild archive \
            -project "CLI Pulse Bar/CLI Pulse Bar.xcodeproj" \
            -scheme "CLI Pulse Bar" \
            -destination "generic/platform=macOS" \
            -archivePath build/ci-archive/CLIPulse-macOS.xcarchive \
            -configuration Release \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=""

      - name: Embed Swift helper + plist into archive
        run: |
          set -o pipefail
          ./scripts/embed_helper_in_archive.sh build/ci-archive/CLIPulse-macOS.xcarchive

      - name: Verify Codex's four archive conditions
        run: |
          set -o pipefail
          ARCHIVE="build/ci-archive/CLIPulse-macOS.xcarchive"
          APP="$ARCHIVE/Products/Applications/CLI Pulse Bar.app"

          echo "=== check 1: helper Mach-O at Contents/Helpers/ ==="
          test -x "$APP/Contents/Helpers/cli_pulse_helper" \
            || (echo "::error::helper missing" && exit 1)
          file "$APP/Contents/Helpers/cli_pulse_helper" | grep -q "Mach-O" \
            || (echo "::error::helper not Mach-O" && exit 1)

          echo "=== check 2: LaunchAgent plist at Contents/Library/LaunchAgents/ ==="
          test -f "$APP/Contents/Library/LaunchAgents/yyh.CLI-Pulse.helper.plist" \
            || (echo "::error::LaunchAgent plist missing" && exit 1)

          echo "=== check 3: codesign --verify --deep --strict ==="
          codesign --verify --deep --strict "$APP" \
            || (echo "::error::codesign verify failed" && exit 1)

          echo "=== check 4: BundleProgram points at embedded helper ==="
          BP="$(/usr/libexec/PlistBuddy -c 'Print :BundleProgram' \
            "$APP/Contents/Library/LaunchAgents/yyh.CLI-Pulse.helper.plist")"
          [ "$BP" = "Contents/Helpers/cli_pulse_helper" ] \
            || (echo "::error::BundleProgram is '$BP', expected 'Contents/Helpers/cli_pulse_helper'" && exit 1)

          echo "OK: archive contains embedded helper + plist; signature verifies"
