name: Swift CI

on:
  push:
    paths:
      - 'CLI Pulse Bar/**'
      - '.github/workflows/swift-ci.yml'
  pull_request:
    paths:
      - 'CLI Pulse Bar/**'
      - '.github/workflows/swift-ci.yml'

concurrency:
  group: swift-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: CLIPulseCore unit tests
    # v1.10.6: bumped macos-14 → macos-15 for Xcode 16+ / Swift tools 6.0.
    # Sentry-cocoa 9.10+ declares swift-tools-version: 6.0 in its Package.swift,
    # which Xcode 15 (macos-14) can't parse → SPM resolve fails before compile.
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Swift test
        working-directory: CLI Pulse Bar/CLIPulseCore
        env:
          # DEBUG SupabaseConstants.anonKey lazy init triggers fatalError if
          # missing (v1.10.6 P3-6 self-check path). Any non-empty stub is
          # enough — the tests don't hit the network.
          CLI_PULSE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-key' }}
        # v1.10.6: dropped --parallel. Under macos-15 / Xcode 16 / Swift 6
        # tooling, parallel test execution exposes pre-existing shared-state
        # races in ProviderLimitMigrationTests (UserDefaults) and similar
        # tests that touch global singletons. Serial is ~50% slower but
        # deterministic, and the suite is small enough (~220 tests) that
        # the total wall time is still under 2 min.
        run: swift test

  build-apps:
    name: Build ${{ matrix.scheme }}
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: CLI Pulse Bar
            destination: platform=macOS
          - scheme: CLI Pulse iOS
            destination: generic/platform=iOS Simulator
          - scheme: CLI Pulse Watch
            destination: generic/platform=watchOS Simulator
          - scheme: CLI Pulse Widgets
            destination: platform=macOS
          - scheme: CLIPulseHelper
            destination: platform=macOS

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Build ${{ matrix.scheme }}
        working-directory: CLI Pulse Bar
        run: |
          set -o pipefail
          xcodebuild build \
            -project "CLI Pulse Bar.xcodeproj" \
            -scheme "${{ matrix.scheme }}" \
            -destination "${{ matrix.destination }}" \
            -configuration Debug \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=""
