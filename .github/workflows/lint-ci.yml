name: Lint (warning-only)

# Style linters that surface findings but never block merges.
# Upgrade to `continue-on-error: false` individually once the codebase is clean.

on:
  push:
    paths:
      - 'CLI Pulse Bar/**'
      - 'android/**'
      - '.github/workflows/lint-ci.yml'
  pull_request:
    paths:
      - 'CLI Pulse Bar/**'
      - 'android/**'
      - '.github/workflows/lint-ci.yml'

concurrency:
  group: lint-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint (warning-only)
    runs-on: macos-14
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint on CLI Pulse Bar targets
        working-directory: CLI Pulse Bar
        run: |
          swiftlint lint --reporter github-actions-logging \
            "CLI Pulse Bar" \
            "CLI Pulse Bar iOS" \
            "CLI Pulse Bar Watch" \
            "CLI Pulse Widgets" \
            "CLIPulseCore/Sources" \
            "CLIPulseHelper"

  ktlint:
    name: ktlint / Android lint (warning-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-lint-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: gradle-lint-

      - name: Android lint (debug)
        run: ./gradlew lintDebug --no-daemon --continue

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
