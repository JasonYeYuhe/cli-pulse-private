name: Lint (warning-only)

# Style linters that surface findings but never block merges.
# Upgrade to `continue-on-error: false` individually once the codebase is clean.

on:
  push:
    paths:
      - 'CLI Pulse Bar/**'
      - 'android/**'
      - '.github/workflows/lint-ci.yml'
  pull_request:
    paths:
      - 'CLI Pulse Bar/**'
      - 'android/**'
      - '.github/workflows/lint-ci.yml'
  # v1.26 C2: lets us manually retrigger after a GitHub Actions repo-
  # wide outage (2026-05-26 PM: 5.5 h zero runs) without an empty
  # commit. swift-ci already exposes this trigger; mirror it on the
  # other four workflows for symmetric incident recovery.
  workflow_dispatch: {}

concurrency:
  group: lint-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint (warning-only)
    runs-on: macos-14
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint on CLI Pulse Bar targets
        working-directory: CLI Pulse Bar
        run: |
          swiftlint lint --reporter github-actions-logging \
            "CLI Pulse Bar" \
            "CLI Pulse Bar iOS" \
            "CLI Pulse Bar Watch" \
            "CLI Pulse Widgets" \
            "CLIPulseCore/Sources" \
            "CLIPulseHelper"

  ktlint:
    name: ktlint / Android lint (warning-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-lint-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: gradle-lint-

      # Mirror android-ci.yml: the google-services Gradle plugin runs even on
      # `lintDebug` and aborts the configuration phase without
      # google-services.json. The file is gitignored, so write it from the
      # GOOGLE_SERVICES_JSON secret. Fail loud if the secret is missing — a
      # stub does not satisfy the plugin's validation.
      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::Secret GOOGLE_SERVICES_JSON is not set."
            echo "::error::Set it with: gh secret set GOOGLE_SERVICES_JSON < android/app/google-services.json"
            exit 1
          fi
          mkdir -p app
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Android lint (debug)
        run: ./gradlew lintDebug --no-daemon --continue

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-lint-report
          path: android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
