name: DEVID DMG ship

# v1.20 A9 — automated Developer ID DMG build for the cli-pulse-distrib
# Beta channel. Manual-trigger only (workflow_dispatch + push-to-tag) so
# accidental main pushes don't cut a release. Mirrors the local
# `scripts/build_devid_dmg.sh` pipeline used through v1.19.0 (per
# docs/v1.19_DEVID_CHANNEL.md) but on macos-14 GitHub-hosted runners
# with an ephemeral keychain so codesign + notarytool work headless.
#
# Triggers:
#   - workflow_dispatch (manual): build only; user inspects the
#     uploaded artifact before promoting.
#   - push tag `app-v*` (e.g. app-v1.20.0): build + upload to
#     cli-pulse-distrib release matching the tag.
#
# Required GitHub repo secrets (set via `gh secret set <NAME>` once):
#   APPLE_DISTRIBUTION_P12_BASE64  — base64-encoded Developer ID
#                                    Application .p12 from
#                                    ~/Library/Application Support/CLI-Pulse-Secrets/
#                                    Generate: `base64 -i cert.p12 | pbcopy`
#   APPLE_DISTRIBUTION_P12_PASSWORD — passphrase for the .p12
#   APPLE_NOTARY_USER              — Apple ID (Apple-issued, e.g.
#                                    yyyyy.yeyuhe@icloud.com)
#   APPLE_NOTARY_APP_PASSWORD      — app-specific password from
#                                    appleid.apple.com (16-hex format)
#   APPLE_TEAM_ID                  — KHMK6Q3L3K
#   DEV_ID_APP                     — Identity name, e.g.
#                                    "Developer ID Application: Yuhe Ye (KHMK6Q3L3K)"
#   DISTRIB_REPO_PAT               — GitHub PAT with `repo` scope for
#                                    cli-pulse/cli-pulse-distrib pushes
#                                    (only needed for upload-on-tag path)

on:
  workflow_dispatch:
    inputs:
      promote_to_latest:
        description: "Promote uploaded build to `latest` manifest after upload"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - 'app-v*'

permissions:
  contents: read

jobs:
  build:
    name: Build + notarize Developer ID DMG
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --version
          xcrun notarytool --version

      - name: Set up ephemeral signing keychain
        # Per Gemini round 1 CRITICAL: macos-14 runners cannot pull a
        # raw .p12 into the default keychain; you must create a build
        # keychain, unlock it, import with -T allowing the relevant
        # tools, and set-key-partition-list so codesign can use the
        # private key non-interactively. Skipping any of these four
        # steps lands codesign in a "no identity found" failure mode
        # that's hard to diagnose from logs alone.
        env:
          P12_B64: ${{ secrets.APPLE_DISTRIBUTION_P12_BASE64 }}
          P12_PW: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
        run: |
          set -o pipefail
          if [[ -z "$P12_B64" ]]; then
            echo "::error::APPLE_DISTRIBUTION_P12_BASE64 secret not set — see workflow header for setup instructions"
            exit 1
          fi
          RUNNER_PW="$(uuidgen)"
          KEYCHAIN="build.keychain"
          security create-keychain -p "$RUNNER_PW" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$RUNNER_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          P12_PATH="$RUNNER_TEMP/devid.p12"
          echo "$P12_B64" | base64 -d > "$P12_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN" -P "$P12_PW" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S 'apple-tool:,apple:,codesign:' -s -k "$RUNNER_PW" "$KEYCHAIN"
          rm -f "$P12_PATH"
          security list-keychains -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Install sentry-cli (for dSYM upload)
        # build_devid_dmg.sh Step 2b uploads dSYMs to Sentry so v1.34+ DEVID
        # production crashes symbolicate. The runner has no sentry-cli by
        # default, so the upload silently skipped ("sentry-cli not installed").
        # Best-effort: `|| true` keeps a brew hiccup from failing a release
        # build — the dSYM upload is non-blocking, and without the
        # SENTRY_AUTH_TOKEN secret it skips cleanly anyway.
        run: brew install getsentry/tools/sentry-cli || true

      - name: Build + notarize DMG
        env:
          DEV_ID_APP: ${{ secrets.DEV_ID_APP }}
          APPLE_NOTARY_USER: ${{ secrets.APPLE_NOTARY_USER }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Set the SENTRY_AUTH_TOKEN repo secret to enable dSYM upload (org
          # scope: Source Map Upload + Release Creation). Absent => Step 2b
          # skips gracefully (build_devid_dmg.sh load_sentry_auth_token).
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -o pipefail
          if [[ -z "${DEV_ID_APP:-}" ]]; then
            echo "::error::DEV_ID_APP secret not set"; exit 1
          fi
          mkdir -p build/devid-dmg
          ./scripts/build_devid_dmg.sh --output-dir "$PWD/build/devid-dmg" --arch arm64

      - name: List outputs
        run: ls -la build/devid-dmg

      - name: Verify compiled Info.plist version is expanded
        # Per Gemini round 1 CRITICAL + v1.20 A8: catch unexpanded
        # $(MARKETING_VERSION) drift in the actual notarized .app
        # before we ship to AppUpdater clients. The .app lives under
        # `staging/CLI Pulse.app` after build_devid_dmg.sh — only the
        # .dmg + sha256 + manifest land at the output-dir top level.
        run: |
          set -o pipefail
          APP="build/devid-dmg/staging/CLI Pulse.app"
          if [[ ! -d "$APP" ]]; then
            echo "::error::expected app bundle not present at $APP"
            find build/devid-dmg -maxdepth 3 -type d
            exit 1
          fi
          short=$(plutil -extract CFBundleShortVersionString raw -o - "$APP/Contents/Info.plist")
          build=$(plutil -extract CFBundleVersion raw -o - "$APP/Contents/Info.plist")
          if [[ -z "$short" || "$short" == *'$('* ]]; then
            echo "::error::CFBundleShortVersionString unexpanded: $short"
            exit 1
          fi
          if [[ -z "$build" || "$build" == *'$('* ]]; then
            echo "::error::CFBundleVersion unexpanded: $build"
            exit 1
          fi
          echo "OK: app version $short build $build"

      - name: Verify codesign + notarization
        # Drop `--strict` per the same macOS 26.5 xattr race fix in
        # scripts/build_signed_app.sh — `com.apple.provenance`
        # re-appears on _CodeSignature/CodeResources faster than
        # `xattr -cr` can strip. spctl + stapler validate are the
        # real gates (notarytool also pre-validated upstream).
        run: |
          set -o pipefail
          APP="build/devid-dmg/staging/CLI Pulse.app"
          DMG=$(ls build/devid-dmg/CLI-Pulse-*-arm64.dmg | head -1)
          xattr -cr "$APP" 2>/dev/null || true
          codesign --verify --deep --verbose=2 "$APP"
          spctl --assess --type exec --verbose "$APP"
          spctl --assess --type open --context context:primary-signature --verbose "$DMG"
          xcrun stapler validate "$APP"
          xcrun stapler validate "$DMG"

      - name: Verify artifact identity (mirror client UpdateVerifier)
        # Trust Hardening v2 (PR-3): server-side mirror of UpdateVerifier (PR-1).
        # Assert the shipped .app satisfies the EXACT designated requirement the
        # client enforces before installing an update (Developer ID + team OU +
        # bundle id + Developer ID marker OIDs), and that its version/build match
        # the manifest the AppUpdater clients will read. Catches a mis-signed or
        # mis-versioned release before it can reach the update channel.
        run: |
          set -o pipefail
          APP="build/devid-dmg/staging/CLI Pulse.app"
          MANIFEST=$(ls build/devid-dmg/manifest-fragment-*.json | head -1)
          REQ='anchor apple generic and identifier "yyh.CLI-Pulse" and certificate leaf[subject.OU] = "KHMK6Q3L3K" and certificate 1[field.1.2.840.113635.100.6.2.6] exists and certificate leaf[field.1.2.840.113635.100.6.1.13] exists'
          codesign --verify --strict -R="$REQ" "$APP"
          BID=$(codesign -dv "$APP" 2>&1 | sed -n 's/^Identifier=//p')
          [[ "$BID" == "yyh.CLI-Pulse" ]] || { echo "::error::bundle id '$BID' != yyh.CLI-Pulse"; exit 1; }
          APP_VER=$(plutil -extract CFBundleShortVersionString raw -o - "$APP/Contents/Info.plist")
          APP_BUILD=$(plutil -extract CFBundleVersion raw -o - "$APP/Contents/Info.plist")
          M_VER=$(jq -r .version "$MANIFEST")
          M_BUILD=$(jq -r .build "$MANIFEST")
          [[ "$APP_VER" == "$M_VER" ]] || { echo "::error::app version $APP_VER != manifest $M_VER"; exit 1; }
          [[ "$APP_BUILD" == "$M_BUILD" ]] || { echo "::error::app build $APP_BUILD != manifest $M_BUILD"; exit 1; }
          echo "OK: client requirement satisfied; bundle=$BID version=$APP_VER build=$APP_BUILD == manifest"

      - name: Verify DEVID app unsandboxed + xterm bundle present (W2)
        # The in-app terminal is gated on !isSandboxed, so a sandboxed DEVID app
        # would re-hide the feature on every shipped build (the W1-A bug).
        # build_signed_app.sh already runs a full semantic verifier DURING the
        # build; this re-checks the FINAL notarized + stapled artifact that
        # actually ships to AppUpdater clients. Render fidelity itself stays a
        # manual on-device smoke (docs/DEVID_TERMINAL_SMOKE.md) — headless macOS
        # suppresses rAF/GPU compositing so a WKWebView render test would flake.
        run: |
          set -o pipefail
          APP="build/devid-dmg/staging/CLI Pulse.app"
          ENT="$(codesign -d --entitlements :- "$APP" 2>/dev/null)"
          if grep -qF "com.apple.security.app-sandbox" <<< "$ENT"; then
            echo "::error::DEVID app is SANDBOXED — the in-app terminal would be hidden"; exit 1
          fi
          if ! grep -qF "KHMK6Q3L3K.group.yyh.CLI-Pulse" <<< "$ENT"; then
            echo "::error::keychain-access-group missing/unexpanded (want KHMK6Q3L3K.group.yyh.CLI-Pulse)"; exit 1
          fi
          if ! grep -qF "group.yyh.CLI-Pulse" <<< "$ENT"; then
            echo "::error::application-group group.yyh.CLI-Pulse missing"; exit 1
          fi
          if grep -qF '$(' <<< "$ENT"; then
            echo "::error::unexpanded \$( macro in signed entitlements"; exit 1
          fi
          XTERM="$APP/Contents/Resources/CLIPulseCore_CLIPulseCore.bundle/Contents/Resources"
          for f in index.html xterm.js xterm.css; do
            if [[ ! -f "$XTERM/$f" ]]; then
              echo "::error::xterm bundle missing $f at $XTERM"; exit 1
            fi
          done
          echo "OK: DEVID app unsandboxed; keychain group expanded; xterm bundle present"

      - name: Tar archive (act as build artifact)
        run: |
          cd build/devid-dmg
          tar -cJf "../devid-dmg-artifact.tar.xz" .
          ls -la ../devid-dmg-artifact.tar.xz

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: devid-dmg-${{ github.run_id }}
          path: build/devid-dmg-artifact.tar.xz
          retention-days: 30

      - name: Publish to cli-pulse-distrib (tag push only)
        # On a push to tag `app-v1.20.0` etc., upload the DMG to the
        # cli-pulse-distrib repo's matching release. We do NOT promote
        # to the `latest` manifest in this step — that's a manual
        # post-smoke action per docs/v1.19_DEVID_CHANNEL.md.
        if: startsWith(github.ref, 'refs/tags/app-v')
        env:
          GH_TOKEN: ${{ secrets.DISTRIB_REPO_PAT }}
        run: |
          set -o pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::DISTRIB_REPO_PAT secret not set; cannot upload to cli-pulse-distrib"
            exit 1
          fi
          TAG="${GITHUB_REF##*/}"
          DMG=$(ls build/devid-dmg/CLI-Pulse-*-arm64.dmg | head -1)
          SHA="${DMG}.sha256"
          MANIFEST=$(ls build/devid-dmg/manifest-fragment-*.json | head -1)
          # Create release if missing (idempotent)
          if ! gh release view "$TAG" --repo cli-pulse/cli-pulse-distrib >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo cli-pulse/cli-pulse-distrib \
              --title "CLI Pulse Mac ${TAG#app-v} (Developer ID Beta)" \
              --notes "Built by GitHub Actions ($(date -u +%FT%TZ)). Awaiting clean-Mac smoke + manual promotion to \`latest\` manifest."
          fi
          gh release upload "$TAG" \
            --repo cli-pulse/cli-pulse-distrib \
            --clobber \
            "$DMG" \
            "$SHA" \
            "$MANIFEST"
          echo "Uploaded artifacts to $TAG. Manual latest promotion still required after clean-Mac smoke."

      - name: Promote to latest manifest (manual, gated)
        # Trust Hardening v2 (PR-3): wires the previously-dead promote_to_latest
        # input. On an explicit manual run with promote_to_latest=true (and only
        # after every codesign/notarization/identity gate above has passed),
        # publish the freshly-built+verified DMG to its app-v<version> release and
        # promote latest.json to point at it, then re-verify the published
        # manifest matches the built artifact. Codifies the manual promotion so it
        # can't repeat the `gh release create file#name` rename pitfall (the asset
        # MUST be named latest.json — we upload a file literally named latest.json).
        if: github.event_name == 'workflow_dispatch' && inputs.promote_to_latest == 'true'
        env:
          GH_TOKEN: ${{ secrets.DISTRIB_REPO_PAT }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::DISTRIB_REPO_PAT not set; cannot promote"; exit 1
          fi
          DMG=$(ls build/devid-dmg/CLI-Pulse-*-arm64.dmg | head -1)
          SHA_FILE="${DMG}.sha256"
          MANIFEST=$(ls build/devid-dmg/manifest-fragment-*.json | head -1)
          VERSION=$(jq -r .version "$MANIFEST")
          DMG_SHA=$(jq -r .sha256 "$MANIFEST")
          TAG="app-v${VERSION}"
          echo "Promoting $TAG (sha ${DMG_SHA:0:12}) to latest"
          # 1) ensure the versioned release carries the exact verified artifact
          if ! gh release view "$TAG" --repo cli-pulse/cli-pulse-distrib >/dev/null 2>&1; then
            gh release create "$TAG" --repo cli-pulse/cli-pulse-distrib \
              --title "CLI Pulse Mac ${VERSION} (Developer ID Beta)" \
              --notes "Built + promoted by GitHub Actions ($(date -u +%FT%TZ))."
          fi
          gh release upload "$TAG" --repo cli-pulse/cli-pulse-distrib --clobber "$DMG" "$SHA_FILE" "$MANIFEST"
          # 2) promote latest.json — upload a file literally named latest.json
          #    (NEVER `gh release create file#name`, whose rename is a no-op).
          cp "$MANIFEST" "$RUNNER_TEMP/latest.json"
          if ! gh release view latest --repo cli-pulse/cli-pulse-distrib >/dev/null 2>&1; then
            gh release create latest --repo cli-pulse/cli-pulse-distrib --prerelease \
              --title "Latest app manifest" \
              --notes "Points to the current Developer ID Beta build."
          fi
          gh release upload latest --repo cli-pulse/cli-pulse-distrib --clobber "$RUNNER_TEMP/latest.json"
          # 3) re-verify the promoted manifest matches the built artifact (API, no CDN cache)
          rm -rf "$RUNNER_TEMP/verify" && mkdir -p "$RUNNER_TEMP/verify"
          gh release download latest --repo cli-pulse/cli-pulse-distrib --pattern latest.json --dir "$RUNNER_TEMP/verify" --clobber
          PUB_VER=$(jq -r .version "$RUNNER_TEMP/verify/latest.json")
          PUB_SHA=$(jq -r .sha256 "$RUNNER_TEMP/verify/latest.json")
          if [[ "$PUB_VER" != "$VERSION" || "$PUB_SHA" != "$DMG_SHA" ]]; then
            echo "::error::latest.json mismatch after promote (got ${PUB_VER}/${PUB_SHA:0:12}, want ${VERSION}/${DMG_SHA:0:12})"; exit 1
          fi
          echo "OK: latest.json promoted to ${PUB_VER} (sha ${PUB_SHA:0:12})"
