name: Helper CI

on:
  push:
    paths:
      - 'helper/**'
      - 'scripts/check_helper_version_sync.sh'
      - 'HelperSwift/Sources/HelperKit/Protocol.swift'
      - '.github/workflows/helper-ci.yml'
  pull_request:
    paths:
      - 'helper/**'
      - 'scripts/check_helper_version_sync.sh'
      - 'HelperSwift/Sources/HelperKit/Protocol.swift'
      - '.github/workflows/helper-ci.yml'
  # v1.26 C2: manual retrigger trigger so a future Actions outage
  # can be unstuck without an empty-commit push.
  workflow_dispatch: {}

concurrency:
  group: helper-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-sync:
    name: Helper version sync (Swift kHelperVersion == Python HELPER_VERSION)
    # Duplicated from swift-ci's check-helper-guards ON PURPOSE: a Python-only
    # HELPER_VERSION bump touches helper/** which does NOT trigger swift-ci,
    # so without this job the exact 1.23.0->1.29.1 drift the guard exists to
    # prevent would land unchecked again (codex review on the guard's own PR).
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: bash scripts/check_helper_version_sync.sh

  test:
    runs-on: ubuntu-latest
    # v1.21 G4: cap CI minutes. Pytest PTY subprocess tests can hang on a
    # mis-configured runner (see feedback_pytest_hang_stale memory).
    timeout-minutes: 10
    defaults:
      run:
        working-directory: helper

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dev tooling
        run: python -m pip install --upgrade pip pytest ruff cryptography

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Upload pytest junit on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: helper-test-output
          path: helper/.pytest_cache/
          if-no-files-found: ignore
