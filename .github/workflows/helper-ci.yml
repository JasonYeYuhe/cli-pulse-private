name: Helper CI

on:
  push:
    paths:
      - 'helper/**'
      - '.github/workflows/helper-ci.yml'
  pull_request:
    paths:
      - 'helper/**'
      - '.github/workflows/helper-ci.yml'
  # v1.26 C2: manual retrigger trigger so a future Actions outage
  # can be unstuck without an empty-commit push.
  workflow_dispatch: {}

concurrency:
  group: helper-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # v1.21 G4: cap CI minutes. Pytest PTY subprocess tests can hang on a
    # mis-configured runner (see feedback_pytest_hang_stale memory).
    timeout-minutes: 10
    defaults:
      run:
        working-directory: helper

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install dev tooling
        run: python -m pip install --upgrade pip pytest ruff cryptography

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Upload pytest junit on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helper-test-output
          path: helper/.pytest_cache/
          if-no-files-found: ignore
