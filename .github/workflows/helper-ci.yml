name: Helper CI

on:
  push:
    paths:
      - 'helper/**'
      - '.github/workflows/helper-ci.yml'
  pull_request:
    paths:
      - 'helper/**'
      - '.github/workflows/helper-ci.yml'

concurrency:
  group: helper-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # v1.21 G4: cap CI minutes. Pytest PTY subprocess tests can hang on a
    # mis-configured runner (see feedback_pytest_hang_stale memory).
    timeout-minutes: 10
    defaults:
      run:
        working-directory: helper

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev tooling
        run: python -m pip install --upgrade pip pytest ruff cryptography

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Upload pytest junit on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: helper-test-output
          path: helper/.pytest_cache/
          if-no-files-found: ignore
