name: Android CI

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'android/**'

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # v1.21 G4: cap CI minutes; a hung Gradle daemon can otherwise eat
    # unlimited billed time on the runner.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: gradle-

      # google-services.json is gitignored. Write it from a secret at CI time
      # so the google-services Gradle plugin can run. If the secret is absent
      # we fail loud — a stub won't satisfy the plugin's validation.
      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::Secret GOOGLE_SERVICES_JSON is not set."
            echo "::error::Set it with: gh secret set GOOGLE_SERVICES_JSON < android/app/google-services.json"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build release APK + AAB
        run: ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # v1.20.1 C5: SENTRY_DSN is read in app/build.gradle.kts:44 via
          # `System.getenv("SENTRY_DSN")`. Without this, CI-produced release
          # AABs would carry an empty DSN string and silently drop every crash
          # report. Repo secret ANDROID_SENTRY_DSN must be set; see
          # docs/CI_SECRETS.md or `gh secret set ANDROID_SENTRY_DSN`.
          SENTRY_DSN: ${{ secrets.ANDROID_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload release AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: error

      - name: Upload R8 mapping for release symbolication
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-mapping-${{ github.sha }}
          path: android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: android/app/build/reports/tests/
