name: Android CI

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'android/**'
  # v1.26 C2: manual retrigger trigger so a future Actions outage
  # can be unstuck without an empty-commit push.
  workflow_dispatch: {}

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # v1.21 G4: cap CI minutes; a hung Gradle daemon can otherwise eat
    # unlimited billed time on the runner.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Supply-chain: verify every Gradle wrapper jar against Gradle's
      # known-good checksums BEFORE any ./gradlew runs. A tampered
      # gradle-wrapper.jar executes with full job privileges (signing keys,
      # Supabase/Sentry secrets) on its first invocation, so this is the
      # first real step.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: gradle-

      # google-services.json is gitignored. Write it from a secret at CI time
      # so the google-services Gradle plugin can run. If the secret is absent
      # we fail loud — a stub won't satisfy the plugin's validation.
      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::Secret GOOGLE_SERVICES_JSON is not set."
            echo "::error::Set it with: gh secret set GOOGLE_SERVICES_JSON < android/app/google-services.json"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Locale parity guard (v1.21 E6)
        # Fails CI if any values-<locale>/strings.xml is missing keys that
        # exist in values/strings.xml. Catches the v1.21-era drift where
        # values-es / values-ko / values-zh-rTW were ~30% behind.
        run: python3 ../scripts/ci_check_android_strings_parity.py

      - name: Terminal bundle parity guard (v1.27 E4)
        # Fails CI if the vendored xterm.js bundle under android assets drifts
        # from the iOS source of truth (all files byte-identical except the
        # Android-shimmed index.html). Prevents silent xterm.js divergence (R3).
        run: python3 ../scripts/ci_check_terminal_bundle_parity.py

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build release APK + AAB
        run: ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # v1.20.1 C5: SENTRY_DSN is read in app/build.gradle.kts:44 via
          # `System.getenv("SENTRY_DSN")`. Without this, CI-produced release
          # AABs would carry an empty DSN string and silently drop every crash
          # report. Repo secret ANDROID_SENTRY_DSN must be set; see
          # docs/CI_SECRETS.md or `gh secret set ANDROID_SENTRY_DSN`.
          SENTRY_DSN: ${{ secrets.ANDROID_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload release AAB
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: error

      - name: Upload R8 mapping for release symbolication
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-mapping-${{ github.sha }}
          path: android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: android/app/build/reports/tests/
