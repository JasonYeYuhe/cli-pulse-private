name: Supabase CI

on:
  push:
    paths:
      - 'backend/supabase/**'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/APIClient.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/HelperAPIClient.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/AlertGenerator.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/Models.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/DemoDataProvider.swift'
      - 'helper/**'
      - 'android/app/src/main/java/com/clipulse/android/data/remote/**'
      - '.github/workflows/supabase-ci.yml'
  pull_request:
    paths:
      - 'backend/supabase/**'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/APIClient.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/HelperAPIClient.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/AlertGenerator.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/Models.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/DemoDataProvider.swift'
      - 'helper/**'
      - 'android/app/src/main/java/com/clipulse/android/data/remote/**'
      - '.github/workflows/supabase-ci.yml'
  # v1.26 C2: manual retrigger trigger so a future Actions outage
  # can be unstuck without an empty-commit push.
  workflow_dispatch: {}

concurrency:
  group: supabase-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  search-path-guard:
    name: SECURITY DEFINER search_path regression guard (P0-3)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check every public SECURITY DEFINER function pins search_path
        run: python3 backend/supabase/ci_check_search_path.py

  rpc-contract:
    name: RPC contract drift guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Static RPC contract check
        run: python3 backend/supabase/ci_check_rpc_contract.py

  date-windows:
    name: Rolling-window off-by-one guard (P0-2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Static rolling-window inclusive-N check
        run: python3 backend/supabase/ci_check_date_windows.py

  alert-types:
    name: Webhook TYPE_ALIASES drift guard (iter2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Static alert-type coverage check
        run: python3 backend/supabase/ci_check_alert_types.py

  user-id-cascade:
    name: GDPR right-to-erasure cascade guard (iter2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Every public table with user_id cascades to auth.users
        run: python3 backend/supabase/ci_check_user_id_cascade.py

  edge-fn-deno-tests:
    # M-9 (2026-06-07 review): the edge-function deno tests
    # (send-approval-push privacy/auth, send-webhook SSRF) existed but CI
    # never ran them — they could silently rot. Run them on every change.
    name: Edge function deno tests (M-9)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run edge-function deno tests
        run: deno test backend/supabase/functions/

  # v1.21 F9 (DEFERRED to v1.22): live migration replay against a fresh
  # `supabase start` Postgres uncovers a deeper structural issue: the
  # baseline `schema.sql` is a current-state snapshot, and replaying
  # `schema.sql → migrate_v0.X.sql` in order doubly-applies anything
  # already present in the snapshot (first surfaced at migrate_v0.9.sql
  # CREATE POLICY → "policy already exists"). Fixing this needs either
  # (a) a "schema.sql is anchored at vN" annotation so the replay skips
  # migrations <=vN, or (b) restructuring so migrations are the sole
  # source-of-truth and schema.sql is auto-generated from a replay. Out
  # of scope for v1.21 long-tail; tracking as a v1.22 deliverable.
