name: Supabase CI

on:
  push:
    paths:
      - 'backend/supabase/**'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/APIClient.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/HelperAPIClient.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/AlertGenerator.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/Models.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/DemoDataProvider.swift'
      - 'helper/**'
      - 'android/app/src/main/java/com/clipulse/android/data/remote/**'
      - '.github/workflows/supabase-ci.yml'
  pull_request:
    paths:
      - 'backend/supabase/**'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/APIClient.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/HelperAPIClient.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/AlertGenerator.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/Models.swift'
      - 'CLI Pulse Bar/CLIPulseCore/Sources/CLIPulseCore/DemoDataProvider.swift'
      - 'helper/**'
      - 'android/app/src/main/java/com/clipulse/android/data/remote/**'
      - '.github/workflows/supabase-ci.yml'
  # v1.26 C2: manual retrigger trigger so a future Actions outage
  # can be unstuck without an empty-commit push.
  workflow_dispatch: {}

concurrency:
  group: supabase-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  search-path-guard:
    name: SECURITY DEFINER search_path regression guard (P0-3)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Check every public SECURITY DEFINER function pins search_path
        run: python3 backend/supabase/ci_check_search_path.py

  rpc-contract:
    name: RPC contract drift guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Static RPC contract check
        run: python3 backend/supabase/ci_check_rpc_contract.py

  date-windows:
    name: Rolling-window off-by-one guard (P0-2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Static rolling-window inclusive-N check
        run: python3 backend/supabase/ci_check_date_windows.py

  alert-types:
    name: Webhook TYPE_ALIASES drift guard (iter2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Static alert-type coverage check
        run: python3 backend/supabase/ci_check_alert_types.py

  user-id-cascade:
    name: GDPR right-to-erasure cascade guard (iter2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Every public table with user_id cascades to auth.users
        run: python3 backend/supabase/ci_check_user_id_cascade.py

  edge-fn-deno-tests:
    # M-9 (2026-06-07 review): the edge-function deno tests
    # (send-approval-push privacy/auth, send-webhook SSRF) existed but CI
    # never ran them — they could silently rot. Run them on every change.
    name: Edge function deno tests (M-9)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.x

      - name: Run edge-function deno tests
        run: deno test backend/supabase/functions/

  rls-cross-user:
    # C-3 (DEV_PLAN 2026-06-27 PR3): cross-user RLS denial tests. Decoupled from
    # the schema.sql double-apply blocker below — instead of replaying
    # schema.sql onto a Supabase snapshot, we seed a BRAND-NEW Postgres from the
    # repo schema (00_supabase_shim → schema.sql → remote-table DDL → fixtures)
    # and assert, as a non-superuser `authenticated` role, that user-B cannot
    # SELECT/INSERT/UPDATE user-A rows on remote_sessions, remote_session_commands,
    # remote_session_events, remote_permission_requests, remote_permission_decisions,
    # subscriptions, daily_usage_metrics — and that a team_members ADMIN cannot
    # self-promote to owner (NEW-H2v / migrate_v0.59). psql -v ON_ERROR_STOP=1
    # makes any cross-user success fail the job.
    name: Cross-user RLS denial tests (C-3)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Ensure psql client
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: Create a fresh database
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -c 'drop database if exists rlstest;' -c 'create database rlstest;'

      - name: Run cross-user RLS denial suite
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rlstest
        run: bash backend/supabase/tests/rls/run_rls_tests.sh

  # v1.21 F9 (still DEFERRED): a FULL `schema.sql → migrate_v0.X.sql` replay
  # against a fresh `supabase start` Postgres double-applies anything already in
  # the schema.sql snapshot (first surfaced at migrate_v0.9.sql CREATE POLICY →
  # "policy already exists"). The cross-user RLS coverage that blocker was
  # holding up is now delivered by the `rls-cross-user` job above (fresh-seed,
  # no replay). A clean end-to-end replay still needs either (a) a "schema.sql is
  # anchored at vN" annotation so the replay skips migrations <=vN, or (b)
  # migrations as the sole source-of-truth with schema.sql auto-generated.
